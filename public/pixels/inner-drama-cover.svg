    <ellipse cx="150" cy="168" rx="90" ry="150" fill="#1b1411"/>
    <rect x="70" y="210" width="160" height="250" rx="48" fill="#17110f"/>
    <circle cx="150" cy="92" r="54" fill="#c68c63"/>
    <ellipse cx="118" cy="104" rx="48" ry="70" fill="#7d3f27"/>
  </g>
