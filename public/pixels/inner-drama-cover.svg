  <text x="820" y="790" text-anchor="middle" fill="url(#gold)" filter="url(#shadow)" font-size="132" font-family="serif" font-weight="900">而我保持不变</text>
  <text x="810" y="858" text-anchor="middle" fill="#f8df9c" font-size="28" font-family="serif" letter-spacing="8">这一次，我要夺回我的一切……？</text>
