    <text x="72" y="190" fill="#17120f" font-size="62" font-family="serif" font-weight="700">《离婚夜，霸总</text>
    <text x="74" y="278" fill="#17120f" font-size="62" font-family="serif" font-weight="700">强吻我后，白月光也疯了》</text>
  </g>
