<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140d08"/>
      <stop offset="0.48" stop-color="#4b2e19"/>
      <stop offset="1" stop-color="#090807"/>
    </linearGradient>
    <radialGradient id="light" cx="72%" cy="30%" r="55%">
      <stop offset="0" stop-color="#f4d99c" stop-opacity="0.34"/>
      <stop offset="0.46" stop-color="#c08a45" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3ba"/>
      <stop offset="0.42" stop-color="#d6a24f"/>
      <stop offset="0.72" stop-color="#fff0b0"/>
      <stop offset="1" stop-color="#8d5a24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#fff2b0" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#light)"/>
  <g opacity="0.35">
    <rect x="950" y="0" width="260" height="900" fill="#130b07"/>
    <rect x="1010" y="0" width="10" height="900" fill="#d7a968"/>
